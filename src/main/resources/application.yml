# ==============================================
# OA System - 主配置文件
# ==============================================
server:
  port: 8080
  servlet:
    context-path: /oa

spring:
  application:
    name: oa-system
  profiles:
    active: dev
  # Jackson 全局配置
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: GMT+8
    serialization:
      write-dates-as-timestamps: false
  # 文件上传
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 50MB

# ==============================================
# MyBatis-Plus 配置
# ==============================================
mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.oasystem.*.entity
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
    cache-enabled: false

# ==============================================
# JWT 配置
# ==============================================
jwt:
  secret: oa-system-jwt-secret-key-must-be-at-least-256-bits-long-for-hs256
  expiration: 86400000  # 24小时 (毫秒)
  header: Authorization
  token-prefix: "Bearer "

# ==============================================
# Knife4j API文档
# ==============================================
knife4j:
  enable: true
  setting:
    language: zh-CN

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs
